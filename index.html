<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON to Java DTO Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar untuk tampilan yang lebih rapi */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        pre {
            tab-size: 4;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                JSON to Java DTO (Spring Boot)
            </h1>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-4 max-w-7xl mx-auto w-full flex flex-col md:flex-row gap-6">
        
        <!-- Left Panel: Input JSON -->
        <div class="w-full md:w-1/2 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex-grow flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <label for="jsonInput" class="font-semibold text-gray-700">Input JSON:</label>
                    <button onclick="formatJSON()" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1 rounded border border-gray-300 transition-colors">Format JSON</button>
                </div>
                <textarea id="jsonInput" class="w-full flex-grow p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-sm resize-none min-h-[400px]" placeholder='Masukkan request atau response JSON di sini...&#10;&#10;Contoh:&#10;{&#10;  "Msg": {&#10;    "MsgHeader": {&#10;      "MsgID": "TEST-BAAS-001"&#10;    }&#10;  }&#10;}'></textarea>
                
                <div class="mt-4 flex flex-col sm:flex-row gap-3 items-end sm:items-center">
                    <div class="flex-grow w-full">
                        <label for="rootClassName" class="block text-sm font-medium text-gray-700 mb-1">Root Class Name:</label>
                        <input type="text" id="rootClassName" value="RootResponse" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
                    </div>
                    <button onclick="generate()" class="w-full sm:w-auto bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-6 rounded-md shadow-sm transition-colors flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        Generate DTO
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Output Java -->
        <div class="w-full md:w-1/2 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex-grow flex flex-col relative">
                <div class="flex justify-between items-center mb-2">
                    <label class="font-semibold text-gray-700">Hasil Generate Java Class:</label>
                    <button onclick="copyCode()" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1 rounded border border-indigo-200 transition-colors flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                        Copy All
                    </button>
                </div>
                
                <div id="errorMsg" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-3 mb-3 text-sm rounded"></div>
                
                <div class="flex-grow bg-[#1e1e1e] rounded-lg overflow-hidden border border-gray-800 relative">
                    <pre id="javaOutput" class="text-gray-300 font-mono text-sm p-4 h-full overflow-auto whitespace-pre"></pre>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Set default value based on user example
        const defaultJson = {
                "user_id": 101,
                "profile": {
                    "name": "Jane Doe",
                    "contact": {
                    "email": "jane.doe@example.com",
                    "phones": ["+1-555-0199", "+1-555-0123"]
                    },
                    "address": {
                    "street": "123 Tech Lane",
                    "city": "San Francisco",
                    "geo": {
                        "lat": "37.7749",
                        "lng": "-122.4194"
                    }
                    }
                },
                "preferences": {
                    "notifications": {
                    "email": true,
                    "sms": false
                    },
                    "theme": "dark"
                },
                "orders": [
                    {
                    "id": "A456",
                    "items": [
                        { "name": "Wireless Mouse", "price": 25.99 },
                        { "name": "Mechanical Keyboard", "price": 89.00 }
                    ]
                    }
                ]
            };
        document.getElementById('jsonInput').value = JSON.stringify(defaultJson, null, 2);

        // Kata kunci yang dihindari dalam Java
        const javaKeywords = ['abstract', 'assert', 'boolean', 'break', 'byte', 'case', 'catch', 'char', 'class', 'const', 'continue', 'default', 'do', 'double', 'else', 'enum', 'extends', 'final', 'finally', 'float', 'for', 'goto', 'if', 'implements', 'import', 'instanceof', 'int', 'interface', 'long', 'native', 'new', 'package', 'private', 'protected', 'public', 'return', 'short', 'static', 'strictfp', 'super', 'switch', 'synchronized', 'this', 'throw', 'throws', 'transient', 'try', 'void', 'volatile', 'while'];

        function formatJSON() {
            try {
                const el = document.getElementById('jsonInput');
                const parsed = JSON.parse(el.value);
                el.value = JSON.stringify(parsed, null, 2);
                hideError();
            } catch (e) {
                showError("Invalid JSON: Tidak dapat memformat. Pastikan JSON valid.");
            }
        }

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.innerText = msg;
            errorEl.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMsg').classList.add('hidden');
        }

        // Helper untuk mengubah array menjadi bentuk singular (Misal: AdditionalStatusCodes -> AdditionalStatusCode)
        function singularize(word) {
            if (word.endsWith('ies')) return word.slice(0, -3) + 'y';
            if (word.endsWith('ses')) return word.slice(0, -2);
            if (word.endsWith('s') && !word.endsWith('ss')) return word.slice(0, -1);
            return word;
        }

        // Helper Capitalize
        function capitalize(word) {
            if (!word) return word;
            return word.charAt(0).toUpperCase() + word.slice(1);
        }

        // Helper camelCase
        function toCamelCase(str) {
            let s = str.replace(/[-_](.)/g, (_, c) => c.toUpperCase());
            s = s.charAt(0).toLowerCase() + s.slice(1);
            
            // Cek keyword java
            if (javaKeywords.includes(s)) {
                return s + "Field";
            }
            return s;
        }

        // Menentukan tipe data primitif/standar
        function getPrimitiveType(value) {
            if (value === null) return "Object";
            if (typeof value === "boolean") return "Boolean";
            if (typeof value === "number") {
                if (Number.isInteger(value)) {
                    return value > 2147483647 ? "Long" : "Integer";
                }
                return "Double";
            }
            return "String";
        }

        function generate() {
            hideError();
            const jsonStr = document.getElementById('jsonInput').value;
            let rootName = document.getElementById('rootClassName').value.trim();
            if (!rootName) rootName = "RootDto";
            // Pastikan class name diawali huruf besar
            rootName = capitalize(rootName);

            let parsedObj;
            try {
                parsedObj = JSON.parse(jsonStr);
            } catch (e) {
                showError("Invalid JSON: " + e.message);
                return;
            }

            const classesMap = {};
            let hasList = false;

            // Fungsi rekursif untuk membaca object
            function parseObject(obj, className) {
                if (classesMap[className]) return; // Cegah duplikasi class dgn nama sama

                const fields = [];
                for (const key in obj) {
                    const value = obj[key];
                    let fieldType = 'String';
                    const originalKey = key;
                    const fieldName = toCamelCase(key);

                    if (value === null) {
                        fieldType = 'Object';
                    } else if (Array.isArray(value)) {
                        hasList = true;
                        if (value.length > 0) {
                            const firstItem = value[0];
                            if (typeof firstItem === 'object' && firstItem !== null) {
                                // Array of Objects
                                const itemClassName = capitalize(singularize(key));
                                parseObject(firstItem, itemClassName);
                                fieldType = `List<${itemClassName}>`;
                            } else {
                                // Array of Primitives
                                fieldType = `List<${getPrimitiveType(firstItem)}>`;
                            }
                        } else {
                            fieldType = 'List<Object>';
                        }
                    } else if (typeof value === 'object') {
                        // Nested Object
                        const childClassName = capitalize(key);
                        parseObject(value, childClassName);
                        fieldType = childClassName;
                    } else {
                        // Primitive
                        fieldType = getPrimitiveType(value);
                    }

                    fields.push({ type: fieldType, name: fieldName, original: originalKey });
                }
                classesMap[className] = fields;
            }

            // Mulai parsing dari root
            if (typeof parsedObj === 'object' && !Array.isArray(parsedObj) && parsedObj !== null) {
                parseObject(parsedObj, rootName);
            } else if (Array.isArray(parsedObj)) {
                showError("Root JSON harus berupa Object {}, bukan Array [].");
                return;
            } else {
                showError("JSON tidak valid untuk dijadikan DTO.");
                return;
            }

            // Build Java Code String
            let javaCode = "";
            javaCode += "import lombok.Data;\n";
            javaCode += "import lombok.NoArgsConstructor;\n";
            javaCode += "import lombok.AllArgsConstructor;\n";
            javaCode += "import com.fasterxml.jackson.annotation.JsonProperty;\n";
            if (hasList) {
                javaCode += "import java.util.List;\n";
            }
            javaCode += "\n";

            // Loop map classes untuk dirender menjadi string
            for (const [className, fields] of Object.entries(classesMap)) {
                javaCode += "@Data\n";
                javaCode += "@NoArgsConstructor\n";
                javaCode += "@AllArgsConstructor\n";
                javaCode += `public class ${className} {\n`;

                fields.forEach((field, index) => {
                    // Tambahkan anotasi Jackson untuk JSON key asli
                    javaCode += `    @JsonProperty("${field.original}")\n`;
                    javaCode += `    private ${field.type} ${field.name};\n`;
                    if (index < fields.length - 1) {
                        javaCode += "\n";
                    }
                });

                javaCode += "}\n\n";
            }

            document.getElementById('javaOutput').innerText = javaCode.trim();
        }

        function copyCode() {
            const code = document.getElementById('javaOutput').innerText;
            if (!code) {
                alert("Belum ada kode yang bisa disalin!");
                return;
            }
            
            // Clipboard API bisa memiliki behavior berbeda jika dalam iframe/sandbox, 
            // fallback ke execCommand jika gagal.
            try {
                navigator.clipboard.writeText(code).then(() => {
                    alert("Kode Java berhasil disalin ke clipboard!");
                }).catch(err => {
                    fallbackCopyTextToClipboard(code);
                });
            } catch(e) {
                fallbackCopyTextToClipboard(code);
            }
        }

        function fallbackCopyTextToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                alert("Kode Java berhasil disalin ke clipboard!");
            } catch (err) {
                alert("Gagal menyalin kode.");
            }
            document.body.removeChild(textArea);
        }

        // Generate on load with default example
        window.onload = () => {
            generate();
        };

    </script>
</body>
</html>
